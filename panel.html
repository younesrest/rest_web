<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Panel de Control | Rest</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --bg-input: #1a1a24;
      --text: #e0e0e5;
      --text-muted: #6b6b80;
      --primary: #00ff88;
      --primary-dim: rgba(0, 255, 136, 0.1);
      --danger: #ff4466;
      --warning: #ffaa00;
      --border: #2a2a3a;
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    code, .mono {
      font-family: 'Fira Code', monospace;
    }

    /* ========== LOGIN ========== */
    .login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-screen.hidden {
      display: none;
    }

    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      margin: 1rem;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      background: var(--primary-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.5rem;
    }

    .login-header h1 {
      font-size: 1.25rem;
      margin-bottom: 0.25rem;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Fira Code', monospace;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }

    .login-btn:hover {
      opacity: 0.9;
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-error {
      background: rgba(255, 68, 102, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    .login-attempts {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ========== DASHBOARD ========== */
    .dashboard {
      display: none;
    }

    .dashboard.active {
      display: block;
    }

    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 600;
    }

    .header-logo svg {
      width: 24px;
      height: 24px;
      color: var(--primary);
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .btn-danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .stat-card h3 {
      font-size: 2rem;
      font-family: 'Fira Code', monospace;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }

    .stat-card p {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      overflow-x: auto;
    }

    .tab {
      padding: 0.75rem 1.25rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--primary);
      background: var(--primary-dim);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Table */
    .table-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .table-header h2 {
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-input {
      padding: 0.5rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      min-width: 200px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      padding: 1rem 1.25rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--bg-input);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    td {
      font-size: 0.875rem;
    }

    tr:hover td {
      background: var(--primary-dim);
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.625rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-primary {
      background: var(--primary-dim);
      color: var(--primary);
    }

    .badge-warning {
      background: rgba(255, 170, 0, 0.1);
      color: var(--warning);
    }

    /* Messages */
    .message-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    .message-card:hover {
      border-color: var(--primary);
    }

    .message-card.unread {
      border-left: 3px solid var(--primary);
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      gap: 1rem;
    }

    .message-from {
      font-weight: 600;
    }

    .message-email {
      color: var(--primary);
      font-size: 0.875rem;
    }

    .message-date {
      color: var(--text-muted);
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .message-subject {
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .message-body {
      color: var(--text-muted);
      font-size: 0.9375rem;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .header-content {
        justify-content: center;
      }
      
      .header-actions {
        width: 100%;
        justify-content: center;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <div class="login-header">
        <div class="login-icon">🔐</div>
        <h1>Panel de Control</h1>
        <p>Introduce tus credenciales</p>
      </div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" class="form-input" placeholder="usuario" autocomplete="username" required>
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        
        <button type="submit" class="login-btn" id="login-btn">Acceder</button>
        
        <div class="login-error" id="login-error">
          Usuario o contraseña incorrectos
        </div>
        
        <div class="login-attempts" id="login-attempts"></div>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <header class="header">
      <div class="header-content">
        <div class="header-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Panel de Rest</span>
        </div>
        
        <div class="header-actions">
          <button class="btn" onclick="refreshData()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
            Actualizar
          </button>
          <button class="btn" onclick="exportData()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar
          </button>
          <button class="btn btn-danger" onclick="clearData()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            Borrar
          </button>
          <a href="index.html" class="btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Volver
          </a>
          <button class="btn btn-danger" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Salir
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <h3 id="stat-total">0</h3>
          <p>Total Visitantes</p>
        </div>
        <div class="stat-card">
          <h3 id="stat-today">0</h3>
          <p>Hoy</p>
        </div>
        <div class="stat-card">
          <h3 id="stat-messages">0</h3>
          <p>Mensajes</p>
        </div>
        <div class="stat-card">
          <h3 id="stat-unread">0</h3>
          <p>Sin leer</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('visitors')">👥 Visitantes</button>
        <button class="tab" onclick="switchTab('messages')">✉️ Mensajes</button>
      </div>

      <!-- Visitors Tab -->
      <div class="tab-content active" id="tab-visitors">
        <div class="table-card">
          <div class="table-header">
            <h2>📊 Registro de Visitantes</h2>
            <input type="text" class="search-input" placeholder="Buscar por IP, ubicación..." oninput="filterVisitors(this.value)">
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>IP</th>
                  <th>Ubicación</th>
                  <th>Navegador</th>
                  <th>Sistema</th>
                  <th>Dispositivo</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody id="visitors-table"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Messages Tab -->
      <div class="tab-content" id="tab-messages">
        <div id="messages-container"></div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script>
    // ========== AUTH ==========
    const AUTH_KEY = 'rest_auth_session';
    const ATTEMPTS_KEY = 'rest_login_attempts';
    const LOCKOUT_KEY = 'rest_lockout_until';
    
    let visitors = [];
    let messages = [];

    // Check lockout
    function isLockedOut() {
      const lockout = localStorage.getItem(LOCKOUT_KEY);
      if (lockout && Date.now() < parseInt(lockout)) {
        return true;
      }
      localStorage.removeItem(LOCKOUT_KEY);
      return false;
    }

    // Get attempts
    function getAttempts() {
      return parseInt(localStorage.getItem(ATTEMPTS_KEY) || '0');
    }

    // Update attempts display
    function updateAttemptsDisplay() {
      const el = document.getElementById('login-attempts');
      const attempts = getAttempts();
      const max = window.CONFIG?.admin?.maxAttempts || 5;
      
      if (attempts > 0) {
        el.textContent = `Intentos: ${attempts}/${max}`;
      } else {
        el.textContent = '';
      }
    }

    // Login
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      if (isLockedOut()) {
        const remaining = Math.ceil((parseInt(localStorage.getItem(LOCKOUT_KEY)) - Date.now()) / 60000);
        document.getElementById('login-error').textContent = `Bloqueado. Espera ${remaining} minutos.`;
        document.getElementById('login-error').classList.add('show');
        return;
      }
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      const config = window.CONFIG?.admin || {};
      const correctUser = config.username || 'rest';
      const correctPass = config.password || 'CyberRest2024!';
      const maxAttempts = config.maxAttempts || 5;
      
      if (username === correctUser && password === correctPass) {
        // Success
        localStorage.removeItem(ATTEMPTS_KEY);
        sessionStorage.setItem(AUTH_KEY, 'true');
        showDashboard();
      } else {
        // Failed
        const attempts = getAttempts() + 1;
        localStorage.setItem(ATTEMPTS_KEY, attempts.toString());
        
        if (attempts >= maxAttempts) {
          // Lockout for 5 minutes
          localStorage.setItem(LOCKOUT_KEY, (Date.now() + 5 * 60 * 1000).toString());
          document.getElementById('login-error').textContent = 'Demasiados intentos. Bloqueado por 5 minutos.';
        } else {
          document.getElementById('login-error').textContent = `Usuario o contraseña incorrectos`;
        }
        
        document.getElementById('login-error').classList.add('show');
        updateAttemptsDisplay();
      }
    });

    // Show dashboard
    function showDashboard() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.add('active');
      loadData();
    }

    // Logout
    function logout() {
      sessionStorage.removeItem(AUTH_KEY);
      location.reload();
    }

    // Check auth on load
    if (sessionStorage.getItem(AUTH_KEY) === 'true') {
      showDashboard();
    } else {
      updateAttemptsDisplay();
    }

    // ========== DATA ==========
    function loadData() {
      try {
        visitors = JSON.parse(localStorage.getItem('rest_visitors') || '[]');
        messages = JSON.parse(localStorage.getItem('rest_messages') || '[]');
      } catch {
        visitors = [];
        messages = [];
      }
      
      updateStats();
      renderVisitors();
      renderMessages();
    }

    function updateStats() {
      const today = new Date().toDateString();
      const todayCount = visitors.filter(v => new Date(v.timestamp).toDateString() === today).length;
      const unread = messages.filter(m => !m.read).length;
      
      document.getElementById('stat-total').textContent = visitors.length;
      document.getElementById('stat-today').textContent = todayCount;
      document.getElementById('stat-messages').textContent = messages.length;
      document.getElementById('stat-unread').textContent = unread;
    }

    function renderVisitors(data = visitors) {
      const tbody = document.getElementById('visitors-table');
      
      if (data.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <p>No hay visitantes registrados</p>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = data.slice(0, 100).map(v => `
        <tr>
          <td><code class="mono">${escapeHtml(v.ip || '-')}</code></td>
          <td>${escapeHtml(v.city || '-')}, ${escapeHtml(v.country || '-')}</td>
          <td><span class="badge badge-primary">${escapeHtml(v.browser || '-')}</span></td>
          <td>${escapeHtml(v.os || '-')}</td>
          <td><span class="badge badge-warning">${escapeHtml(v.device || '-')}</span></td>
          <td class="mono">${formatDate(v.timestamp)}</td>
        </tr>
      `).join('');
    }

    function renderMessages() {
      const container = document.getElementById('messages-container');
      
      if (messages.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <p>No hay mensajes</p>
          </div>
        `;
        return;
      }

      container.innerHTML = messages.map((m, i) => `
        <div class="message-card ${m.read ? '' : 'unread'}" onclick="markRead(${i})">
          <div class="message-header">
            <div>
              <div class="message-from">${escapeHtml(m.name)}</div>
              <div class="message-email">${escapeHtml(m.email)}</div>
            </div>
            <div class="message-date">${formatDate(m.timestamp)}</div>
          </div>
          <div class="message-subject">${escapeHtml(m.subject)}</div>
          <div class="message-body">${escapeHtml(m.message)}</div>
        </div>
      `).join('');
    }

    function markRead(index) {
      messages[index].read = true;
      localStorage.setItem('rest_messages', JSON.stringify(messages));
      updateStats();
      renderMessages();
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
    }

    function filterVisitors(query) {
      const q = query.toLowerCase();
      const filtered = visitors.filter(v =>
        (v.ip || '').toLowerCase().includes(q) ||
        (v.city || '').toLowerCase().includes(q) ||
        (v.country || '').toLowerCase().includes(q) ||
        (v.browser || '').toLowerCase().includes(q) ||
        (v.os || '').toLowerCase().includes(q)
      );
      renderVisitors(filtered);
    }

    function refreshData() {
      loadData();
    }

    function exportData() {
      const data = {
        visitors,
        messages,
        exportedAt: new Date().toISOString()
      };
      
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `rest-data-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearData() {
      if (confirm('⚠️ ¿Seguro que quieres BORRAR todos los datos? Esta acción no se puede deshacer.')) {
        localStorage.removeItem('rest_visitors');
        localStorage.removeItem('rest_messages');
        loadData();
      }
    }

    function formatDate(timestamp) {
      if (!timestamp) return '-';
      try {
        return new Date(timestamp).toLocaleString('es-ES', {
          day: '2-digit',
          month: 'short',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch {
        return '-';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
