<!DOCTYPE html>
<html lang="es" class="dark-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Panel - Rest Portfolio</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --accent: #00d4ff;
      --accent-dim: rgba(0, 212, 255, 0.1);
      --success: #00ff88;
      --warning: #ffaa00;
      --danger: #ff4466;
      --border: #2a2a3a;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Login Screen */
    .login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-screen.hidden {
      display: none;
    }

    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-box h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    .login-box p {
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .login-input {
      width: 100%;
      padding: 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 1rem;
      transition: border-color 0.3s;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .login-btn:hover {
      opacity: 0.9;
    }

    .login-error {
      color: var(--danger);
      margin-top: 1rem;
      display: none;
    }

    /* Dashboard */
    .dashboard {
      display: none;
    }

    .dashboard.active {
      display: block;
    }

    /* Header */
    .admin-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .admin-logo svg {
      color: var(--accent);
    }

    .admin-logo h1 {
      font-size: 1.25rem;
    }

    .admin-actions {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .btn:hover {
      border-color: var(--accent);
    }

    .btn-danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    /* Main Content */
    .admin-content {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .stat-card h3 {
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-card p {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .tab {
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: all 0.3s;
    }

    .tab:hover {
      color: var(--text-primary);
    }

    .tab.active {
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Table */
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .table-header h2 {
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-input {
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 0.875rem;
      width: 250px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1rem 1.5rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--bg-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 600;
    }

    td {
      font-size: 0.875rem;
    }

    tr:hover {
      background: var(--accent-dim);
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-success {
      background: rgba(0, 255, 136, 0.1);
      color: var(--success);
    }

    .badge-warning {
      background: rgba(255, 170, 0, 0.1);
      color: var(--warning);
    }

    .badge-info {
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    /* Tab Content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Message Card */
    .message-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .message-card.unread {
      border-left: 3px solid var(--accent);
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .message-from {
      font-weight: 600;
    }

    .message-email {
      color: var(--accent);
      font-size: 0.875rem;
    }

    .message-date {
      color: var(--text-secondary);
      font-size: 0.75rem;
    }

    .message-subject {
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .message-body {
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        gap: 1rem;
      }

      .table-header {
        flex-direction: column;
        gap: 1rem;
      }

      .search-input {
        width: 100%;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <h1>🔐 Admin Panel</h1>
      <p>Enter password to access the dashboard</p>
      <input type="password" class="login-input" id="password-input" placeholder="Password" autofocus>
      <button class="login-btn" onclick="attemptLogin()">Access Dashboard</button>
      <p class="login-error" id="login-error">Incorrect password</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <header class="admin-header">
      <div class="admin-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <h1>Rest Admin Panel</h1>
      </div>
      <div class="admin-actions">
        <button class="btn" onclick="refreshData()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
          Refresh
        </button>
        <button class="btn" onclick="exportData()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <button class="btn btn-danger" onclick="clearAllData()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          Clear Data
        </button>
        <a href="index.html" class="btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Back to Site
        </a>
      </div>
    </header>

    <main class="admin-content">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <h3 id="total-visitors">0</h3>
          <p>Total Visitors</p>
        </div>
        <div class="stat-card">
          <h3 id="today-visitors">0</h3>
          <p>Today's Visitors</p>
        </div>
        <div class="stat-card">
          <h3 id="total-messages">0</h3>
          <p>Messages</p>
        </div>
        <div class="stat-card">
          <h3 id="unread-messages">0</h3>
          <p>Unread Messages</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('visitors')">
          👥 Visitors
        </button>
        <button class="tab" onclick="switchTab('messages')">
          ✉️ Messages
        </button>
      </div>

      <!-- Visitors Tab -->
      <div class="tab-content active" id="visitors-tab">
        <div class="table-container">
          <div class="table-header">
            <h2>
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Recent Visitors
            </h2>
            <input type="text" class="search-input" placeholder="Search by IP, location..." oninput="filterVisitors(this.value)">
          </div>
          <table>
            <thead>
              <tr>
                <th>IP Address</th>
                <th>Location</th>
                <th>Browser</th>
                <th>OS</th>
                <th>Device</th>
                <th>ISP</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="visitors-table">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Messages Tab -->
      <div class="tab-content" id="messages-tab">
        <div id="messages-container">
          <!-- Populated by JS -->
        </div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script>
    // Check authentication
    const isAuthenticated = () => sessionStorage.getItem('admin_auth') === 'true';
    
    function attemptLogin() {
      const password = document.getElementById('password-input').value;
      const correctPassword = window.CONFIG?.admin?.password || 'rest2024admin';
      
      if (password === correctPassword) {
        sessionStorage.setItem('admin_auth', 'true');
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.add('active');
        loadData();
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('password-input').value = '';
      }
    }

    // Enter key login
    document.getElementById('password-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') attemptLogin();
    });

    // Check if already authenticated
    if (isAuthenticated()) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.add('active');
      loadData();
    }

    // Data storage
    let visitorsData = [];
    let messagesData = [];

    function loadData() {
      // Load visitors
      try {
        visitorsData = JSON.parse(localStorage.getItem('rest_visitors_log') || '[]');
      } catch { visitorsData = []; }

      // Load messages
      try {
        messagesData = JSON.parse(localStorage.getItem('rest_messages') || '[]');
      } catch { messagesData = []; }

      updateStats();
      renderVisitors();
      renderMessages();
    }

    function updateStats() {
      const today = new Date().toDateString();
      const todayVisitors = visitorsData.filter(v => 
        new Date(v.timestamp).toDateString() === today
      ).length;
      
      const unread = messagesData.filter(m => !m.read).length;

      document.getElementById('total-visitors').textContent = visitorsData.length;
      document.getElementById('today-visitors').textContent = todayVisitors;
      document.getElementById('total-messages').textContent = messagesData.length;
      document.getElementById('unread-messages').textContent = unread;
    }

    function renderVisitors(data = visitorsData) {
      const tbody = document.getElementById('visitors-table');
      
      if (data.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="empty-state">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <p>No visitors yet</p>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = data.slice(0, 100).map(v => `
        <tr>
          <td><code>${v.ip || 'Unknown'}</code></td>
          <td>${v.city || 'Unknown'}, ${v.country || ''}</td>
          <td><span class="badge badge-info">${v.browser || 'Unknown'}</span></td>
          <td>${v.os || 'Unknown'}</td>
          <td><span class="badge badge-success">${v.device || 'Unknown'}</span></td>
          <td>${v.isp || 'Unknown'}</td>
          <td>${formatDate(v.timestamp)}</td>
        </tr>
      `).join('');
    }

    function renderMessages() {
      const container = document.getElementById('messages-container');
      
      if (messagesData.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <p>No messages yet</p>
          </div>
        `;
        return;
      }

      container.innerHTML = messagesData.map((m, i) => `
        <div class="message-card ${m.read ? '' : 'unread'}" onclick="markAsRead(${i})">
          <div class="message-header">
            <div>
              <div class="message-from">${escapeHtml(m.name)}</div>
              <div class="message-email">${escapeHtml(m.email)}</div>
            </div>
            <div class="message-date">${formatDate(m.timestamp)}</div>
          </div>
          <div class="message-subject">${escapeHtml(m.subject)}</div>
          <div class="message-body">${escapeHtml(m.message)}</div>
        </div>
      `).join('');
    }

    function markAsRead(index) {
      messagesData[index].read = true;
      localStorage.setItem('rest_messages', JSON.stringify(messagesData));
      updateStats();
      renderMessages();
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(`${tab}-tab`).classList.add('active');
    }

    function filterVisitors(query) {
      const q = query.toLowerCase();
      const filtered = visitorsData.filter(v => 
        (v.ip || '').toLowerCase().includes(q) ||
        (v.city || '').toLowerCase().includes(q) ||
        (v.country || '').toLowerCase().includes(q) ||
        (v.browser || '').toLowerCase().includes(q) ||
        (v.isp || '').toLowerCase().includes(q)
      );
      renderVisitors(filtered);
    }

    function refreshData() {
      loadData();
    }

    function exportData() {
      const data = {
        visitors: visitorsData,
        messages: messagesData,
        exportedAt: new Date().toISOString()
      };
      
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `rest-portfolio-data-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearAllData() {
      if (confirm('⚠️ Are you sure you want to delete ALL visitor and message data? This cannot be undone.')) {
        localStorage.removeItem('rest_visitors_log');
        localStorage.removeItem('rest_messages');
        loadData();
      }
    }

    function formatDate(timestamp) {
      if (!timestamp) return 'Unknown';
      const date = new Date(timestamp);
      return date.toLocaleDateString('es-ES', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
